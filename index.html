<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAGGEA | Data Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: { 0: 'var(--s0)', 1: 'var(--s1)', 2: 'var(--s2)', 3: 'var(--s3)' },
                        ink: { base: 'var(--ink-base)', muted: 'var(--ink-muted)', ghost: 'var(--ink-ghost)' },
                        line: { base: 'var(--line-base)', soft: 'var(--line-soft)' },
                        neon: { cyan: '#00e5ff', blue: '#2979ff', green: '#00e676', amber: '#ffab00', red: '#ff1744' }
                    },
                    // Definição das duas famílias no Tailwind
                    fontFamily: { 
                        sans: ['Syne', 'sans-serif'],
                        display: ['Syne', 'sans-serif'], 
                        mono: ['JetBrains Mono', 'monospace'] 
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --s0: #f0f4f8; --s1: #ffffff; --s2: #e8edf2; --s3: #d4dbe4;
            --ink-base: #0d1117; --ink-muted: #4a5568; --ink-ghost: #8896a5;
            --line-base: #d4dbe4; --line-soft: #eaf0f6;
            --glow-cyan: 0 0 16px rgba(0,229,255,0.25); --glow-blue: 0 0 16px rgba(41,121,255,0.25);
        }
        .dark {
            --s0: #060a10; --s1: #0d1117; --s2: #141b24; --s3: #1c2533;
            --ink-base: #e8edf5; --ink-muted: #7a8899; --ink-ghost: #3d4f63;
            --line-base: #1c2533; --line-soft: #141b24;
        }

        body { 
            background: var(--s0); 
            color: var(--ink-base); 
            font-family: 'Syne', sans-serif; /* Fonte padrão para interface */
        }
        
        .dark body { background: radial-gradient(ellipse 80% 50% at 50% -10%, #0f1c30 0%, #060a10 70%); }

        /* Inputs e áreas de dados usam Mono para precisão visual */
        .field { 
            background: var(--s2); 
            border: 1px solid var(--line-base); 
            color: var(--ink-base); 
            border-radius: 8px; 
            padding: 8px 12px; 
            font-size: 12px; 
            font-family: 'JetBrains Mono', monospace; 
            width: 100%; 
        }
        
        /* Textareas de conteúdo longo voltam para Syne para melhor leitura */
        textarea.field { 
            font-family: 'Syne', sans-serif; 
            font-size: 13px; 
            font-weight: 500;
        }

        /* Tabelas e Métricas usam Mono */
        .tbl td, .tbl th, .metric-box input, .stat-card .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Botões e Navegação usam Syne (estilo Display) */
        .btn, .nav-link, .topic-item, .net-tab {
            font-family: 'Syne', sans-serif;
            letter-spacing: 0.02em;
        }

        /* Classes de utilidade para manter a consistência */
        .font-display { font-family: 'Syne', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Restante do CSS permanece igual... */
        .sidebar { background: var(--s1); border-right: 1px solid var(--line-base); }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; color: var(--ink-muted); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; border-left: 3px solid transparent; }
        .nav-link:hover { background: var(--s2); color: var(--ink-base); }
        .nav-link.active { background: rgba(0,229,255,0.08); color: #00e5ff; border-left-color: #00e5ff; }
        .card { background: var(--s1); border: 1px solid var(--line-base); border-radius: 12px; transition: border-color .2s, box-shadow .2s; }
        .card:hover { border-color: rgba(0,229,255,0.3); box-shadow: var(--glow-cyan); }
        .card-glass { background: rgba(13,17,23,0.6); backdrop-filter: blur(16px); border: 1px solid var(--line-base); border-radius: 12px; }
        .feed-item { background: var(--s2); border: 1px solid var(--line-soft); border-left: 3px solid transparent; border-radius: 8px; cursor: pointer; transition: all .2s; }
        .feed-item.active { background: rgba(0,229,255,0.06); border-left-color: #00e5ff; border-color: rgba(0,229,255,0.25); }
        .sent-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid var(--line-base); background: var(--s2); cursor: pointer; transition: all .2s; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-muted); font-family: 'Syne'; }
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; border: 1px solid; font-family: 'JetBrains Mono'; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; cursor: pointer; transition: all .2s; border: 1px solid transparent; }
        .btn-primary { background: linear-gradient(135deg, #00e5ff, #2979ff); color: #000; box-shadow: 0 4px 20px rgba(0,229,255,0.25); }
        .tbl th { background: var(--s2); color: var(--ink-ghost); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; padding: 10px 14px; border-bottom: 1px solid var(--line-base); }
        .stat-card { background: var(--s1); border: 1px solid var(--line-base); border-radius: 12px; padding: 20px 24px; }
        .glow-cyan { color: #00e5ff; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    ...
</body>
</html>
